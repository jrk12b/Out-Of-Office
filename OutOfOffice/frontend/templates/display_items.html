<!-- OutOfOffice/frontend/templates/frontend/display_items.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Items</title>
</head>
<body>
    <h1>Items from Database</h1>
    <ul>
        {% for item in items %}
            <li>
                <strong>{{ item.name }}</strong><br>
                {{ item.date }}<br>
                Created at: {{ item.created_at }}
            </li>
        {% empty %}
            <li>No items found.</li>
        {% endfor %}
    </ul>
</body>
</html>
