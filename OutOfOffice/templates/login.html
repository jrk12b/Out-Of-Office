<!-- myapp/templates/myapp/login.html -->
<h2>Login</h2>
<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}  <!-- Render form fields as paragraphs -->
    <button type="submit">Login</button>
</form>

{% if messages %}
    <ul>
        {% for message in messages %}
            <li>{{ message }}</li>
        {% endfor %}
    </ul>
{% endif %}
